<!DOCTYPE html>
<html lang="en">
<head>

  }
  .figma-flow-label.flow2 { margin-top: 16px; }

    padding: 2px 0; height: 28px; cursor: pointer;
  }
  .figma-nav-item.first { margin-top: 8px; }

  html, body { height: 100%; background: #0d0d0d; font-family: 'TikTok Sans', -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif; }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  :root { --cyan: #00F1E8; --bg: #080c14; --card: #111827; --card2: #1a2030; --border: rgba(255,255,255,0.08); --text: #ffffff; --muted: #8b95a8; --danger: #ff3b5c; }

  @media (max-height: 800px) {
    .phone-shell { transform: scale(0.78); transform-origin: center; }

  .slide-in { animation: slideIn 0.25s cubic-bezier(0.32,0.72,0,1) forwards; }
  .slide-out { animation: slideOut 0.25s cubic-bezier(0.32,0.72,0,1) forwards; }
  .slide-up { animation: slideUp 0.3s cubic-bezier(0.32,0.72,0,1) forwards; }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0.5; } to { transform: translateX(0); opacity: 1; } }
  @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(-30%); opacity: 0; } }
  @keyframes slideUp { from { transform: translateY(100%); opacity: 0.5; } to { transform: translateY(0); opacity: 1; } }
  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
  @keyframes float { 0%,100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-8px) rotate(180deg); } }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes progressFill { from { width: 0%; } to { width: var(--target); } }
  @keyframes countUp { 0% { content: '0%'; } }
  .sparkle { position: absolute; pointer-events: none; animation: float linear infinite; }
  .stage-bg {
    position: absolute; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 70% 50% at 50% -5%, rgba(0,180,220,0.22) 0%, rgba(0,120,160,0.08) 40%, transparent 70%),

    width: 2px; height: 60%; background: linear-gradient(180deg, rgba(0,241,232,0.6) 0%, transparent 100%);
    filter: blur(30px); pointer-events: none;
  }
  input, textarea { outline: none; border: none; background: transparent; color: white; font-family: inherit; }
  input::placeholder, textarea::placeholder { color: var(--muted); }
  button { cursor: pointer; border: none; font-family: inherit; }
  .scrollable { overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .scrollable::-webkit-scrollbar { display: none; }
  .chip {
    display: inline-flex; align-items: center; gap: 4px;

    background: rgba(0,241,232,0.12); color: var(--cyan); border: 1px solid rgba(0,241,232,0.25);

  .cyan-btn {

  .selectable-card.selected::before {
    content: ''; position: absolute; inset: 0; border-radius: 14px;

</style>
</head>

<script type="text/babel">

// ─── Sparkles Background ──────────────────────────────────────────────────────
const Sparkles = ({ count = 12 }) => {
  const stars = useRef(
    Array.from({ length: count }, (_, i) => ({
      id: i,
      x: 10 + Math.random() * 80,
      y: 5 + Math.random() * 85,
      size: 4 + Math.random() * 8,
      delay: Math.random() * 4,
      dur: 3 + Math.random() * 3,
      color: Math.random() > 0.5 ? 'rgba(0,241,232,0.35)' : 'rgba(255,255,255,0.15)',
      type: Math.random() > 0.4 ? 'star' : 'cross',
    }))
  ).current;
  return (
    <div style={{ position:'absolute', inset:0, pointerEvents:'none', zIndex:1 }}>
      {stars.map(s => (
        <div key={s.id} className="sparkle" style={{
          left:`${s.x}%`, top:`${s.y}%`,
          animationDuration:`${s.dur}s`, animationDelay:`${s.delay}s`,
        }}>
          {s.type === 'star' ? (
            <svg width={s.size} height={s.size} viewBox="0 0 24 24">
              <polygon points="12,2 15,9 22,9 16,14 18,21 12,17 6,21 8,14 2,9 9,9" fill={s.color}/>
            </svg>
          ) : (
            <svg width={s.size} height={s.size} viewBox="0 0 24 24">
              <line x1="12" y1="2" x2="12" y2="22" stroke={s.color} strokeWidth="2"/>
              <line x1="2" y1="12" x2="22" y2="12" stroke={s.color} strokeWidth="2"/>
            </svg>
          )}
        </div>
      ))}
    </div>
  );
};

// ─── User Avatar ──────────────────────────────────────────────────────────────

            </div>
          </div>
        </div>
      </div>
      {/* Action button — full-width cyan */}
      <div style={{ padding:'12px 16px 28px', position:'relative', zIndex:5 }}>
        <button onClick={goNext} style={{ display:'flex', width:358, padding:'12px 16px', justifyContent:'center', alignItems:'center', borderRadius:24, background:'linear-gradient(81deg,#00FCC5 0.1%,#00F1EC 99.9%)', color:'#000', fontWeight:600, fontSize:16, border:'none', cursor:'pointer' }}>Action !</button>
      </div>
    </div>
  );
};

// ─── Screen 7: Generating ─────────────────────────────────────────────────────
const Generating = ({ navigate, choices={} }) => {
  const [progress, setProgress] = useState(0);

  useEffect(() => {
    const interval = setInterval(() => {
      setProgress(p => {
        const next = Math.min(p + (Math.random() * 4 + 1.5), 100);
        if (next >= 100) { clearInterval(interval); setTimeout(()=>navigate('final-result', { choices }), 600); }
        return next;
      });
    }, 120);
    return () => clearInterval(interval);
  }, []);

  const secsLeft = Math.max(0, Math.round((100 - progress) * 0.4));

  return (
    <div className="screen" style={{ color:'#fff', overflow:'hidden' }}>
      <div className="stage-bg"/><div className="stage-beam"/><Sparkles count={16}/>

      {/* StatusBar */}
      <StatusBar/>

      {/* Header — Stage + Dreamina Seedance 2.0, no back button */}
      <div style={{ display:'flex', alignItems:'center', padding:'4px 16px 0', position:'relative', zIndex:5, flexShrink:0 }}>
        <div style={{ width:24, flexShrink:0 }}/>
        <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:1 }}>
          <div style={{ fontSize:18, fontWeight:600, lineHeight:'22px' }}>Stage</div>
          <div style={{ fontSize:12, color:'rgba(255,255,255,0.5)', lineHeight:'15px' }}>Dreamina Seedance 2.0</div>
        </div>
        <div style={{ width:24, flexShrink:0 }}/>
      </div>

      {/* ── Image preview + Avatar ─────────────────────────────────────────────
          paddingBottom:45 reserves space for avatar that extends 45px below image,
          so the next element's marginTop measures from avatar's visual bottom.     */}
      <div style={{ position:'relative', zIndex:5, width:'100%', display:'flex', justifyContent:'center', marginTop:24, paddingBottom:45, flexShrink:0 }}>
        <div style={{ borderRadius:28, overflow:'hidden', flexShrink:0 }}>
          <img src="images/preview.png" alt="Preview" style={{ display:'block', maxWidth:358, height:'auto' }}/>
        </div>
        {/* Avatar: right:24 matches Figma (avatar right edge ≈ 24px from screen right) */}
        <div style={{ position:'absolute', right:24, bottom:0, zIndex:6 }}>
          <div style={{ width:72, height:72, borderRadius:'50%', background:'rgba(0,241,232,0.08)', border:'2px solid rgba(0,241,232,0.42)', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'0 0 20px rgba(0,241,232,0.15)' }}>
            <Avatar size={60}/>
          </div>
        </div>
      </div>

      {/* ── Gradient % ── 40px below image+avatar block */}
      <div style={{ marginTop:40, position:'relative', zIndex:5, alignSelf:'center', fontSize:48, fontWeight:800, letterSpacing:-2, lineHeight:'48px', background:'linear-gradient(75deg,rgb(0,252,197),rgb(0,241,236))', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent', backgroundClip:'text', flexShrink:0 }}>
        {Math.floor(progress)}%
      </div>

      {/* ── Progress bar ── 24px below % */}
      <div style={{ marginTop:24, position:'relative', zIndex:5, padding:'0 24px', width:'100%', flexShrink:0 }}>
        <div style={{ height:4, background:'rgba(255,255,255,0.08)', borderRadius:2, overflow:'hidden' }}>
          <div style={{ height:'100%', width:`${progress}%`, background:'linear-gradient(90deg,rgb(0,252,197),rgb(0,241,236))', borderRadius:2, transition:'width 0.15s' }}/>
        </div>
      </div>

      {/* ── "Rendering…" ── 24px below progress bar */}
      <div style={{ marginTop:24, position:'relative', zIndex:5, fontSize:16, fontWeight:600, color:'#f5f6f6', textAlign:'center', alignSelf:'center', flexShrink:0 }}>
        Rendering your Co-Create Cast…
      </div>

      {/* ── "Around Xs left" ── 8px below rendering text */}
      <div style={{ marginTop:8, position:'relative', zIndex:5, fontSize:14, color:'#797a7a', textAlign:'center', alignSelf:'center', flexShrink:0 }}>
        Around {secsLeft}s left
      </div>

      {/* ── Button ── absolute at bottom, position unchanged */}
      <div style={{ position:'absolute', bottom:28, left:16, right:16, zIndex:5 }}>
        <button onClick={()=>navigate('final-result',{choices})} style={{ display:'flex', width:358, padding:'12px 16px', justifyContent:'center', alignItems:'center', borderRadius:24, background:'linear-gradient(81deg,#00FCC5 0.1%,#00F1EC 99.9%)', color:'#000', fontWeight:600, fontSize:16, border:'none', cursor:'pointer' }}>
          Generate in drafts
        </button>
      </div>
    </div>
  );
};

        </div>
        {/* Music pill */}
        <div style={{ background:'rgba(0,0,0,0.5)', height:42, borderRadius:20, display:'flex', alignItems:'center', paddingLeft:14, cursor:'pointer', flexShrink:0 }}>

            <div style={{ width:28, height:28, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
              <Icon name={icon} size={22} color={iconColor}/>
            </div>
          </div>
        ))}
        {/* Expand chevron — pointing up */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', width:21 }}>
          <div style={{ transform:'rotate(180deg)' }}>
            <Icon name="chevDown" size={20} color="#fff"/>
          </div>
        </div>
      </div>

      {/* Next button — centered gradient, h:44, w:358, rounded-24, bottom:48 */}
      <div style={{ position:'absolute', bottom:48, left:0, right:0, zIndex:10, display:'flex', justifyContent:'center' }}>
        <button onClick={()=>navigate('create-home')} style={{ display:'flex', width:358, padding:'12px 16px', justifyContent:'center', alignItems:'center', borderRadius:24, background:'linear-gradient(81deg,#00FCC5 0.1%,#00F1EC 99.9%)', color:'#000', fontWeight:600, fontSize:16, border:'none', cursor:'pointer' }}>
          Next
        </button>
      </div>
    </div>
  );
};

// ─── Screen 9: Template Detail (Figma node 9:2) ───────────────────────────────
const TemplateDetail = ({ navigate }) => (
  <div className="screen" style={{ background:'#1a1a1a', color:'#fff' }}>

// ═══════════════════════════════════════════════════════════════════════════════
// ROOT APP
// ═══════════════════════════════════════════════════════════════════════════════
const App = () => {
  const initScreen = new URLSearchParams(window.location.search).get('screen') || 'create-home';
  const [screen, setScreen] = useState(initScreen);
  const [screenData, setScreenData] = useState({});

  const navigate = useCallback((to, data={}) => {
    setScreenData(data);
    setScreen(to);
  }, []);

  const renderScreen = () => {
    switch(screen) {
      case 'create-home':       return <CreateHome navigate={navigate}/>;
      case 'ai-cast-entry':     return <AICastEntry navigate={navigate}/>;
      case 'co-create-1':       return <CoCreateFlow navigate={navigate} fromTemplate={false}/>;
      case 'co-create-1-template': return <CoCreateFlow navigate={navigate} fromTemplate={true}/>;
      case 'generating':        return <Generating navigate={navigate} choices={screenData.choices}/>;
      case 'final-result':      return <FinalResult navigate={navigate} choices={screenData.choices}/>;
      case 'template-detail':   return <TemplateDetail navigate={navigate}/>;
      default:                  return <CreateHome navigate={navigate}/>;
    }
  };

  return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'center', padding:'20px', minHeight:'100vh' }}>
      <div style={{ display:'flex', gap:'40px', alignItems:'flex-start' }}>
        {/* Phone */}
        <div className="phone-shell">
          {renderScreen()}
        </div>
        {/* Flow map sidebar — style.css */}
        <div className="figma-sidebar" style={{ paddingTop:'60px' }}>
          <div className="figma-flow-label">FLOW 1</div>
          {[
            ['create-home','Create Home'],
            ['ai-cast-entry','AI Cast Entry'],
            ['co-create-1','Co-Create Steps 1–4'],
            ['generating','Generating…'],
            ['final-result','Final Result'],
          ].map(([s,l],i)=>(
            <div key={s} onClick={()=>navigate(s)} className={`figma-nav-item${i===0?' first':''}`}>
              <div className={`figma-nav-dot${screen===s?' active':''}`}/>
              <span className={`figma-nav-label${screen===s?' active':''}`}>{l}</span>
            </div>
          ))}
          <div className="figma-flow-label flow2">FLOW 2</div>
          {[
            ['template-detail','Template Detail'],
            ['co-create-1-template','Co-Create (template)'],
          ].map(([s,l])=>(
            <div key={s} onClick={()=>navigate(s)} className="figma-nav-item">
              <div className={`figma-nav-dot${screen===s?' active':''}`}/>
              <span className={`figma-nav-label${screen===s?' active':''}`}>{l}</span>
            </div>
          ))}
          <div className="figma-hint-box">
            <p>Click any screen to jump<br/>or tap through the flows<br/>inside the phone.</p>
          </div>
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
