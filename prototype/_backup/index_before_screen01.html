<!DOCTYPE html>
<html lang="en">
<head>

<style>
  @font-face {
    font-family: 'TikTok Sans';
    font-style: normal;
    font-weight: 100 900;
    font-display: swap;
    src: url('https://sf16-website-login.neutral.ttwstatic.com/obj/tiktok_web_login_static/tiktok/webapp/main/webapp-desktop/TikTokSans-VF.woff2') format('woff2'),
         url('https://sf16-scmcdn-va.ibytedtos.com/goofy/tiktok/web/node/_next/static/media/TikTokSans.woff2') format('woff2');
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0d0d0d; font-family: 'TikTok Sans', -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif; }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  :root { --cyan: #00F1E8; --bg: #080c14; --card: #111827; --card2: #1a2030; --border: rgba(255,255,255,0.08); --text: #ffffff; --muted: #8b95a8; --danger: #ff3b5c; }
  .phone-shell {
    width: 390px; height: 844px; border-radius: 44px;
    background: var(--bg); overflow: hidden; position: relative;
    box-shadow: 0 0 0 10px #1a1a1a, 0 0 0 12px #2a2a2a, 0 30px 80px rgba(0,0,0,0.8);
    flex-shrink: 0;
  }
  @media (max-height: 900px) {
    .phone-shell { transform: scale(0.88); transform-origin: center; }
  }
  @media (max-height: 800px) {
    .phone-shell { transform: scale(0.78); transform-origin: center; }
  }
  .screen { position: absolute; inset: 0; overflow: hidden; display: flex; flex-direction: column; }
  .slide-in { animation: slideIn 0.25s cubic-bezier(0.32,0.72,0,1) forwards; }
  .slide-out { animation: slideOut 0.25s cubic-bezier(0.32,0.72,0,1) forwards; }
  .slide-up { animation: slideUp 0.3s cubic-bezier(0.32,0.72,0,1) forwards; }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0.5; } to { transform: translateX(0); opacity: 1; } }
  @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(-30%); opacity: 0; } }
  @keyframes slideUp { from { transform: translateY(100%); opacity: 0.5; } to { transform: translateY(0); opacity: 1; } }
  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
  @keyframes float { 0%,100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-8px) rotate(180deg); } }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes progressFill { from { width: 0%; } to { width: var(--target); } }
  @keyframes countUp { 0% { content: '0%'; } }
  .sparkle { position: absolute; pointer-events: none; animation: float linear infinite; }
  .stage-bg {
    position: absolute; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 70% 50% at 50% -5%, rgba(0,180,220,0.22) 0%, rgba(0,120,160,0.08) 40%, transparent 70%),
                radial-gradient(ellipse 40% 30% at 50% -2%, rgba(0,241,232,0.12) 0%, transparent 50%),
                linear-gradient(180deg, #060d18 0%, #080c14 60%, #060a10 100%);
  }
  .stage-beam {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 2px; height: 60%; background: linear-gradient(180deg, rgba(0,241,232,0.6) 0%, transparent 100%);
    filter: blur(30px); pointer-events: none;
  }
  input, textarea { outline: none; border: none; background: transparent; color: white; font-family: inherit; }
  input::placeholder, textarea::placeholder { color: var(--muted); }
  button { cursor: pointer; border: none; font-family: inherit; }
  .scrollable { overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .scrollable::-webkit-scrollbar { display: none; }
  .chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
    background: rgba(0,241,232,0.12); color: var(--cyan); border: 1px solid rgba(0,241,232,0.25);
    white-space: nowrap;
  }
  .step-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: all 0.3s; }
  .step-dot.active { background: var(--cyan); width: 18px; border-radius: 3px; }
  .cyan-btn {
    background: var(--cyan); color: #000; font-weight: 700; font-size: 16px;
    border-radius: 28px; height: 52px; width: 100%; letter-spacing: 0.3px;
    transition: opacity 0.15s; active: opacity 0.8;
  }
  .cyan-btn:active { opacity: 0.8; }
  .selectable-card {
    background: var(--card); border: 1.5px solid var(--border); border-radius: 14px;
    padding: 14px 16px; cursor: pointer; transition: all 0.18s; position: relative; overflow: hidden;
  }
  .selectable-card.selected { border-color: var(--cyan); background: rgba(0,241,232,0.06); }
  .selectable-card.selected::before {
    content: ''; position: absolute; inset: 0; border-radius: 14px;
    background: radial-gradient(ellipse at 20% 50%, rgba(0,241,232,0.08) 0%, transparent 60%);
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

};

// ─── Sparkles Background ──────────────────────────────────────────────────────
const Sparkles = ({ count = 12 }) => {
  const stars = useRef(
    Array.from({ length: count }, (_, i) => ({
      id: i,
      x: 10 + Math.random() * 80,
      y: 5 + Math.random() * 85,
      size: 4 + Math.random() * 8,
      delay: Math.random() * 4,
      dur: 3 + Math.random() * 3,
      color: Math.random() > 0.5 ? 'rgba(0,241,232,0.35)' : 'rgba(255,255,255,0.15)',
      type: Math.random() > 0.4 ? 'star' : 'cross',
    }))
  ).current;
  return (
    <div style={{ position:'absolute', inset:0, pointerEvents:'none', zIndex:1 }}>
      {stars.map(s => (
        <div key={s.id} className="sparkle" style={{
          left:`${s.x}%`, top:`${s.y}%`,
          animationDuration:`${s.dur}s`, animationDelay:`${s.delay}s`,
        }}>
          {s.type === 'star' ? (
            <svg width={s.size} height={s.size} viewBox="0 0 24 24">
              <polygon points="12,2 15,9 22,9 16,14 18,21 12,17 6,21 8,14 2,9 9,9" fill={s.color}/>
            </svg>
          ) : (
            <svg width={s.size} height={s.size} viewBox="0 0 24 24">
              <line x1="12" y1="2" x2="12" y2="22" stroke={s.color} strokeWidth="2"/>
              <line x1="2" y1="12" x2="22" y2="12" stroke={s.color} strokeWidth="2"/>
            </svg>
          )}
        </div>
      ))}
    </div>
  );
};

const CoCreateFlow = ({ navigate, fromTemplate=false }) => {
  const [step, setStep] = useState(1);
  const [choices, setChoices] = useState({ place:'', story:'', degree:'Bachelor', regalia:'Black & Yellow', people:['Me'], tone:'Proud', camera:'Vlog', music:'Celebration', extra:'' });

  const goNext = () => {
    if (step < 4) setStep(s=>s+1);

  };
  const goBack = () => {
    if (step > 1) setStep(s=>s-1);

  };

  const stepProps = { choices, setChoices, goNext, goBack, step, fromTemplate };
  return <CoCreateStep {...stepProps}/>;
};

            <textarea value={choices.extra} onChange={e=>setChoices(c=>({...c,extra:e.target.value}))} placeholder="e.g. I wear glasses, my regalia has a blue hood…" rows={3} style={{ width:'100%', background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:12, padding:'12px', fontSize:13, color:'#fff', resize:'none', lineHeight:1.5 }}/>
          </div>
        </div>
        <div style={{ padding:'12px 16px 28px', zIndex:5, position:'relative' }}>
          <button className="cyan-btn" onClick={goNext}>Next →</button>
        </div>

  // ── Step 4: Make it yours
  const Toggle4 = ({ label, options, value, onChange }) => (
    <div style={{ marginBottom:20 }}>
      <div style={{ fontSize:12, color:'rgba(255,255,255,0.45)', marginBottom:8, fontWeight:500, textTransform:'uppercase', letterSpacing:0.8 }}>{label}</div>

          <div key={o} onClick={()=>onChange(o)} style={{ padding:'8px 16px', borderRadius:20, background: value===o ? '#00F1E8':'rgba(255,255,255,0.06)', color: value===o?'#000':'#fff', fontSize:13, fontWeight:value===o?700:400, border: value===o?'none':'1px solid rgba(255,255,255,0.1)', cursor:'pointer', transition:'all 0.18s' }}>{o}</div>

        </div>
      </div>
      <div style={{ padding:'12px 16px 28px', zIndex:5, position:'relative' }}>

};

// ─── Screen 7: Generating ─────────────────────────────────────────────────────
const Generating = ({ navigate, choices={} }) => {
  const [progress, setProgress] = useState(0);
  const [stageIdx, setStageIdx] = useState(0);
  const stages = ['Style locked','Storyboard rendering','Motion pass','Final video'];
  const target = useRef(0);

  useEffect(() => {
    const interval = setInterval(() => {
      setProgress(p => {
        const next = Math.min(p + (Math.random() * 4 + 1.5), 100);
        if (next >= 100) { clearInterval(interval); setTimeout(()=>navigate('final-result', { choices }), 600); }
        return next;
      });
    }, 120);
    return () => clearInterval(interval);
  }, []);

  useEffect(() => {
    if (progress > 80) setStageIdx(3);
    else if (progress > 55) setStageIdx(2);
    else if (progress > 25) setStageIdx(1);
    else setStageIdx(0);
  }, [progress]);

  const summaryChips = [
    choices.place || 'Hill Auditorium',
    choices.story ? 'Group Celebration' : 'Group Celebration',
    choices.degree || 'Master',
    choices.regalia || 'Black & Yellow',
    choices.tone || 'Emotional',
  ];

  return (
    <div className="screen" style={{ color:'#fff' }}>
      <div className="stage-bg"/><div className="stage-beam"/><Sparkles count={16}/>
      <div style={{ position:'relative', zIndex:5 }}>
        <StatusBar/>
        <div style={{ display:'flex', alignItems:'center', padding:'4px 20px 0' }}>
          <div onClick={()=>navigate('co-create-1')} style={{ cursor:'pointer', padding:4, opacity:0.5 }}><Icon name="back" size={22} color="#fff"/></div>
          <div style={{ flex:1, textAlign:'center' }}>
            <div style={{ fontWeight:700, fontSize:16 }}>Co-Create Mode</div>
          </div>
          <div style={{ width:30 }}/>
        </div>
      </div>
      {/* Main content */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', zIndex:5, position:'relative', padding:'0 24px' }}>
        {/* Avatar with glow */}
        <div style={{ position:'relative', marginBottom:24 }}>
          <div style={{ width:90, height:90, borderRadius:'50%', background:'rgba(0,241,232,0.08)', border:`2px solid rgba(0,241,232,${0.2+progress/300})`, display:'flex', alignItems:'center', justifyContent:'center', boxShadow:`0 0 ${20+progress/3}px rgba(0,241,232,0.15)` }}>
            <Avatar size={76}/>
          </div>
          {progress<100 && <div style={{ position:'absolute',bottom:-4,right:-4,width:24,height:24,borderRadius:'50%',background:'#00F1E8',display:'flex',alignItems:'center',justifyContent:'center' }}>
            <div style={{ width:12,height:12,border:'2px solid #000',borderTopColor:'transparent',borderRadius:'50%',animation:'spin 0.8s linear infinite' }}/>
          </div>}
        </div>
        {/* Progress */}
        <div style={{ fontSize:52, fontWeight:800, color:'#fff', letterSpacing:-2, marginBottom:4 }}>{Math.floor(progress)}%</div>
        <div style={{ width:'100%', height:4, background:'rgba(255,255,255,0.08)', borderRadius:2, marginBottom:10, overflow:'hidden' }}>
          <div style={{ height:'100%', width:`${progress}%`, background:'linear-gradient(90deg,#00F1E8,rgba(0,241,232,0.6))', borderRadius:2, transition:'width 0.15s', boxShadow:'0 0 8px rgba(0,241,232,0.4)' }}/>
        </div>
        <div style={{ fontSize:15, fontWeight:600, marginBottom:4 }}>Rendering your Co-Create Cast…</div>
        <div style={{ fontSize:12, color:'rgba(255,255,255,0.4)', marginBottom:24 }}>About {Math.max(0,Math.round((100-progress)*0.4))}s left</div>
        {/* Stages */}
        <div style={{ width:'100%', background:'rgba(255,255,255,0.04)', borderRadius:14, padding:'12px 16px', marginBottom:16, border:'1px solid rgba(255,255,255,0.07)' }}>
          {stages.map((s,i)=>(
            <div key={i} style={{ display:'flex', alignItems:'center', gap:10, padding:'6px 0', borderBottom: i<stages.length-1?'1px solid rgba(255,255,255,0.05)':'' }}>
              <div style={{ width:20, height:20, borderRadius:'50%', background: i<stageIdx?'#00F1E8': i===stageIdx?'rgba(0,241,232,0.2)':'rgba(255,255,255,0.06)', border: i===stageIdx?'1.5px solid #00F1E8':'none', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                {i<stageIdx && <Icon name="check" size={11} color="#000" strokeWidth={3}/>}
                {i===stageIdx && <div style={{ width:8,height:8,borderRadius:'50%',background:'#00F1E8',animation:'pulse 1s ease-in-out infinite' }}/>}
              </div>
              <span style={{ fontSize:13, color: i<=stageIdx?'#fff':'rgba(255,255,255,0.3)', fontWeight: i===stageIdx?600:400 }}>{s}</span>
              {i===stageIdx && <span style={{ marginLeft:'auto', fontSize:11, color:'#00F1E8' }}>In progress…</span>}
              {i<stageIdx && <span style={{ marginLeft:'auto', fontSize:11, color:'rgba(0,241,232,0.6)' }}>Done</span>}
            </div>
          ))}
        </div>
        {/* Choice chips */}
        <div style={{ display:'flex', flexWrap:'wrap', gap:6, justifyContent:'center', marginBottom:12 }}>
          {summaryChips.map((c,i)=><span key={i} className="chip">{c}</span>)}
        </div>
        <div style={{ fontSize:11, color:'rgba(255,255,255,0.3)', textAlign:'center', lineHeight:1.5 }}>Your choices help AI understand your intent faster.</div>
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════════════════════
// ROOT APP
// ═══════════════════════════════════════════════════════════════════════════════
const App = () => {
  const initScreen = new URLSearchParams(window.location.search).get('screen') || 'create-home';
  const [screen, setScreen] = useState(initScreen);
  const [screenData, setScreenData] = useState({});

  const navigate = useCallback((to, data={}) => {
    setScreenData(data);
    setScreen(to);
  }, []);

  const renderScreen = () => {
    switch(screen) {
      case 'create-home':       return <CreateHome navigate={navigate}/>;
      case 'ai-cast-entry':     return <AICastEntry navigate={navigate}/>;
      case 'co-create-1':       return <CoCreateFlow navigate={navigate} fromTemplate={false}/>;
      case 'co-create-1-template': return <CoCreateFlow navigate={navigate} fromTemplate={true}/>;
      case 'generating':        return <Generating navigate={navigate} choices={screenData.choices}/>;
      case 'final-result':      return <FinalResult navigate={navigate} choices={screenData.choices}/>;
      case 'template-detail':   return <TemplateDetail navigate={navigate}/>;
      default:                  return <CreateHome navigate={navigate}/>;
    }
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:24 }}>
<div style={{ display:'flex', gap:40, alignItems:'flex-start', flexWrap:'wrap', justifyContent:'center' }}>
        {/* Phone */}
        <div className="phone-shell">
          {renderScreen()}
        </div>
        {/* Flow map sidebar */}
        <div style={{ color:'rgba(255,255,255,0.5)', fontSize:12, lineHeight:2, maxWidth:220, paddingTop:60 }}>
          <div style={{ fontWeight:700, color:'rgba(255,255,255,0.7)', marginBottom:8, fontSize:13, letterSpacing:0.5 }}>FLOW 1</div>
          {[
            ['create-home','Create Home'],
            ['ai-cast-entry','AI Cast Entry'],
            ['co-create-1','Co-Create Steps 1–4'],
            ['generating','Generating…'],
            ['final-result','Final Result'],
          ].map(([s,l])=>(
            <div key={s} onClick={()=>navigate(s)} style={{ cursor:'pointer', display:'flex', alignItems:'center', gap:8, padding:'2px 0' }}>
              <div style={{ width:6, height:6, borderRadius:'50%', background: screen===s?'#00F1E8':'rgba(255,255,255,0.2)', flexShrink:0, transition:'all 0.2s' }}/>
              <span style={{ color: screen===s?'#00F1E8':'rgba(255,255,255,0.45)', transition:'color 0.2s' }}>{l}</span>
            </div>
          ))}
          <div style={{ fontWeight:700, color:'rgba(255,255,255,0.7)', marginBottom:8, marginTop:16, fontSize:13, letterSpacing:0.5 }}>FLOW 2</div>
          {[
            ['template-detail','Template Detail'],
            ['co-create-1-template','Co-Create (template)'],
          ].map(([s,l])=>(
            <div key={s} onClick={()=>navigate(s)} style={{ cursor:'pointer', display:'flex', alignItems:'center', gap:8, padding:'2px 0' }}>
              <div style={{ width:6, height:6, borderRadius:'50%', background: screen===s?'#00F1E8':'rgba(255,255,255,0.2)', flexShrink:0 }}/>
              <span style={{ color: screen===s?'#00F1E8':'rgba(255,255,255,0.45)' }}>{l}</span>
            </div>
          ))}
          <div style={{ marginTop:24, padding:'12px', background:'rgba(0,241,232,0.05)', borderRadius:10, border:'1px solid rgba(0,241,232,0.1)', color:'rgba(0,241,232,0.6)', fontSize:11, lineHeight:1.7 }}>
            Click any screen to jump<br/>or tap through the flows<br/>inside the phone.
          </div>
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
